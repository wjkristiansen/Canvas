name: PR CI (Windows CMake)

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: ["master"]
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.config }})
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        config: [Debug, RelWithDebInfo]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        run: cmake -S . -B build

      - name: Build
        run: cmake --build build --config ${{ matrix.config }} --parallel

      - name: Test
        run: ctest --test-dir build --build-config ${{ matrix.config }} --output-on-failure
